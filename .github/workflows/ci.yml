name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install Playwright browser
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: python -m playwright install --with-deps chromium

      - name: Smoke test CLI
        run: |
          slidebridge version
          slidebridge create-demo --out outputs/demo_slide.png
          slidebridge inspect outputs/demo_slide.png
          slidebridge sample-patches outputs/demo_slide.png --out outputs/demo_coords.csv --count 20 --with-scores
          slidebridge inspect-patches outputs/demo_coords.csv --slide outputs/demo_slide.png
          slidebridge render-overlay outputs/demo_slide.png --patches outputs/demo_coords.csv --out outputs/demo_overlay.png

      - name: Tests
        run: pytest -q

      - name: Viewer visual regression tests
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        env:
          SLIDEBRIDGE_RUN_PLAYWRIGHT: "1"
        run: pytest tests/test_viewer_visual.py -q
